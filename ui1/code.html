.mica-surface {
    background-color: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-top: 1px solid rgba(255, 255, 255, 0.4);
    border-left: 1px solid rgba(255, 255, 255, 0.4);

<body class="min-h-screen flex items-center justify-center p-md font-body-md text-on-surface" data-alt="A serene, abstract desktop wallpaper featuring soft, flowing geometric waves in pastel blue and light gray tones. The lighting is diffused and modern, creating a clean, high-end light-mode aesthetic suitable for a professional workspace. Subtle gradients add depth without overwhelming the foreground UI elements.">
<!-- Launcher Container -->
<div class="w-full max-w-[800px] mica-surface rounded-xl overflow-hidden flex flex-col">
<!-- Search Bar Area -->
<div class="p-lg border-b border-outline-variant/20 flex flex-col gap-sm">
<div class="relative flex items-center search-input-focus rounded-lg bg-surface/50 border border-outline-variant/30 transition-all duration-200">
<span class="material-symbols-outlined text-outline absolute left-md" data-icon="search" style="font-variation-settings: 'FILL' 0;">search</span>
<input autofocus="" class="w-full bg-transparent border-none pl-[48px] pr-md py-md font-body-lg text-body-lg text-on-surface placeholder-on-surface-variant/50 focus:ring-0 outline-none" placeholder="Type here to search" type="text"/>
</div>
<!-- Contextual Nav / Chips -->
<div class="flex gap-sm px-xs pt-sm">
<button class="px-md py-xs rounded-full bg-primary-container/10 text-primary font-label-md text-label-md border border-primary/20 hover:bg-primary-container/20 transition-colors flex items-center gap-xs">
<span>All</span>
</button>
<button class="px-md py-xs rounded-full bg-surface-variant/30 text-on-surface-variant font-label-md text-label-md hover:bg-surface-variant/50 transition-colors flex items-center gap-xs">
<span>Apps</span>
</button>
<button class="px-md py-xs rounded-full bg-surface-variant/30 text-on-surface-variant font-label-md text-label-md hover:bg-surface-variant/50 transition-colors flex items-center gap-xs">
<span>Documents</span>
</button>
<button class="px-md py-xs rounded-full bg-surface-variant/30 text-on-surface-variant font-label-md text-label-md hover:bg-surface-variant/50 transition-colors flex items-center gap-xs">
<span>Web</span>
</button>
</div>
</div>
<!-- Search Results Area -->
<div class="p-sm flex flex-col max-h-[400px] overflow-y-auto">
<!-- Result 1: App -->
<button class="w-full flex items-center justify-between p-md hover:bg-on-surface-variant/5 rounded-lg transition-colors group text-left">
<div class="flex items-center gap-md">
<div class="w-[40px] h-[40px] bg-surface rounded-lg shadow-sm flex items-center justify-center border border-outline-variant/10">
<span class="material-symbols-outlined text-primary text-[24px]" data-icon="language" style="font-variation-settings: 'FILL' 1;">language</span>
</div>
<div class="flex flex-col">
<span class="font-body-md text-body-md font-medium text-on-surface">Google Chrome</span>
<span class="font-label-sm text-label-sm text-on-surface-variant/70 uppercase">App</span>
</div>
</div>
<span class="material-symbols-outlined text-outline-variant opacity-0 group-hover:opacity-100 transition-opacity" data-icon="arrow_forward_ios">arrow_forward_ios</span>
</button>
<!-- Result 2: File -->
<button class="w-full flex items-center justify-between p-md hover:bg-on-surface-variant/5 rounded-lg transition-colors group text-left">
<div class="flex items-center gap-md">
<div class="w-[40px] h-[40px] bg-surface rounded-lg shadow-sm flex items-center justify-center border border-outline-variant/10">
<span class="material-symbols-outlined text-[#107c41] text-[24px]" data-icon="table" style="font-variation-settings: 'FILL' 1;">table</span>
</div>
<div class="flex flex-col">
<span class="font-body-md text-body-md font-medium text-on-surface">Budget_2024.xlsx</span>
<span class="font-label-sm text-label-sm text-on-surface-variant/70 uppercase">File</span>
</div>
</div>
<span class="material-symbols-outlined text-outline-variant opacity-0 group-hover:opacity-100 transition-opacity" data-icon="arrow_forward_ios">arrow_forward_ios</span>
</button>
<!-- Result 3: Setting -->
<button class="w-full flex items-center justify-between p-md hover:bg-on-surface-variant/5 rounded-lg transition-colors group text-left">
<div class="flex items-center gap-md">
<div class="w-[40px] h-[40px] bg-surface rounded-lg shadow-sm flex items-center justify-center border border-outline-variant/10">
<span class="material-symbols-outlined text-secondary text-[24px]" data-icon="settings" style="font-variation-settings: 'FILL' 1;">settings</span>
</div>
<div class="flex flex-col">
<span class="font-body-md text-body-md font-medium text-on-surface">System Settings</span>
<span class="font-label-sm text-label-sm text-on-surface-variant/70 uppercase">Setting</span>
</div>
</div>
<span class="material-symbols-outlined text-outline-variant opacity-0 group-hover:opacity-100 transition-opacity" data-icon="arrow_forward_ios">arrow_forward_ios</span>
</button>
<!-- Result 4: Folder -->
<button class="w-full flex items-center justify-between p-md hover:bg-on-surface-variant/5 rounded-lg transition-colors group text-left">
<div class="flex items-center gap-md">
<div class="w-[40px] h-[40px] bg-surface rounded-lg shadow-sm flex items-center justify-center border border-outline-variant/10">
<span class="material-symbols-outlined text-[#F2C94C] text-[24px]" data-icon="folder" style="font-variation-settings: 'FILL' 1;">folder</span>
</div>
<div class="flex flex-col">
<span class="font-body-md text-body-md font-medium text-on-surface">Project_Nova_Design</span>
<span class="font-label-sm text-label-sm text-on-surface-variant/70 uppercase">Folder</span>
</div>
</div>
<span class="material-symbols-outlined text-outline-variant opacity-0 group-hover:opacity-100 transition-opacity" data-icon="arrow_forward_ios">arrow_forward_ios</span>
</button>
<!-- Result 5: App -->
<button class="w-full flex items-center justify-between p-md hover:bg-on-surface-variant/5 rounded-lg transition-colors group text-left">
<div class="flex items-center gap-md">
<div class="w-[40px] h-[40px] bg-surface rounded-lg shadow-sm flex items-center justify-center border border-outline-variant/10">
<span class="material-symbols-outlined text-[#5865F2] text-[24px]" data-icon="forum" style="font-variation-settings: 'FILL' 1;">forum</span>
</div>
<div class="flex flex-col">
<span class="font-body-md text-body-md font-medium text-on-surface">Discord</span>
<span class="font-label-sm text-label-sm text-on-surface-variant/70 uppercase">App</span>
</div>
</div>
<span class="material-symbols-outlined text-outline-variant opacity-0 group-hover:opacity-100 transition-opacity" data-icon="arrow_forward_ios">arrow_forward_ios</span>
</button>
</div>
<!-- Footer / Action Area -->
<div class="p-sm border-t border-outline-variant/10 bg-surface/30 flex justify-end">
<button class="px-md py-sm rounded-lg bg-transparent text-primary font-label-md text-label-md hover:bg-primary/5 transition-colors flex items-center gap-xs">
<span>Search the web</span>
<span class="material-symbols-outlined text-[16px]" data-icon="open_in_new">open_in_new</span>
</button>
</div>
</div>
